# profiles/helix/config.yaml — personal overlay for the "helix" profile.
#
# Structure per docs/DESIGN.md §7. This is a minimal example: the loader
# (src/profile/loader.ts) only needs to parse this into a usable shape in
# this increment — real provider invocation (claude-cli / codex-cli) is
# built in a later increment (A3).

profile: helix

providers:
  claude-cli:
    kind: cli-bridge
    cmd: claude
  codex-cli:
    kind: cli-bridge
    cmd: codex

roles:
  coder:
    provider: claude-cli
  tester:
    provider: codex-cli

workflow:
  reject_threshold: 2
